<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projetos — HRC Studio</title>
  <meta name="description" content="Conheça os projetos da HRC Studio: branding, identidade visual e apresentações que entregam resultado real." />
  <link rel="icon" type="image/png" href="assets/logo-mark.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header id="header" class="scrolled">
    <div class="header-inner">
      <a href="index.html" class="brand"><img src="assets/logo-mark.png" alt="HRC Studio" /></a>
      <nav class="nav-desktop">
        <a href="index.html#servicos">Serviços</a>
        <a href="index.html#processo">Processo</a>
        <a href="projetos.html">Projetos</a>
        <a href="index.html#criativos">Criativos</a>
        <a href="index.html#faq">FAQ</a>
      </nav>
      <a href="index.html#contato" class="btn btn-sm btn-primary nav-cta">Falar agora</a>
    </div>
  </header>

  <main style="padding-top:7rem">
    <section class="section" style="padding-top:2rem">
      <div class="container">
        <div class="section-head" style="text-align:left;max-width:none">
          <a href="index.html" style="color:var(--muted-foreground);font-size:.875rem">← Voltar</a>
          <h2 style="margin-top:1rem">Nossos <span class="text-gradient">projetos</span></h2>
          <p>Selecione um projeto para ver a galeria completa.</p>
        </div>
        <div class="projects-grid" id="projectsGrid"></div>
      </div>
    </section>
  </main>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox" hidden>
    <button class="lb-close" id="lbClose" aria-label="Fechar">×</button>
    <button class="lb-prev" id="lbPrev" aria-label="Anterior">‹</button>
    <button class="lb-next" id="lbNext" aria-label="Próxima">›</button>
    <div class="lb-stage"><img id="lbImg" alt="" /></div>
    <div class="lb-counter" id="lbCounter"></div>
  </div>

  <!-- ALBUM MODAL -->
  <div class="album" id="album" hidden>
    <div class="album-head container">
      <button class="btn btn-ghost btn-sm" id="albumClose">← Voltar</button>
      <div>
        <div class="eyebrow" id="albumCat"></div>
        <h2 id="albumTitle" style="font-size:1.75rem;margin-top:.25rem"></h2>
      </div>
    </div>
    <div class="container album-grid" id="albumGrid"></div>
  </div>

  <footer>
    <img src="assets/logo-full.png" alt="" class="footer-watermark" />
    <div class="container footer-inner">
      <div class="footer-top">
        <div>
          <img src="assets/logo-full.png" alt="HRC Studio" class="footer-logo" />
          <p>Marketing focado em resultado, com criatividade e estratégia.</p>
        </div>
      </div>
      <div class="footer-bottom">
        <p>© <span id="year"></span> HRC Studio. Todos os direitos reservados.</p>
        <p>CNPJ 54.124.846/0001-62 · Feito com foco em performance.</p>
      </div>
    </div>
  </footer>

  <script src="projetos.js"></script>
</body>
</html>
